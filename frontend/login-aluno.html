<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ofício da História — Login Aluno</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        history: {
                            bg: '#0B0F17',
                            card: '#131A26',
                            gold: '#D4AF37',
                            goldHover: '#AA8417',
                            textMuted: '#94A3B8'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .bg-premium-gradient {
            background: radial-gradient(circle at center, #161f30 0%, #0b0f17 100%);
        }
    </style>
</head>
<body class="bg-history-bg text-slate-100 min-h-screen bg-premium-gradient flex flex-col justify-center items-center px-4 font-sans">

    <div class="w-full max-w-md bg-history-card border border-slate-800 rounded-2xl p-8 shadow-2xl space-y-6">
        <div class="text-center space-y-2">
            <h1 class="text-3xl font-serif font-bold tracking-wider text-history-gold">🏛️</h1>
            <h2 class="text-2xl font-serif font-bold tracking-tight text-white">Ofício da História</h2>
            <p class="text-xs text-history-textMuted uppercase tracking-widest font-semibold">Portal do Aluno</p>
        </div>

        <div id="error-message" class="hidden bg-red-950/80 text-red-400 border border-red-500/30 p-3 rounded-lg text-xs text-center font-medium">
            CPF ou senha incorretos. Verifique os dados.
        </div>

        <form id="login-form" class="space-y-4">
            <div class="space-y-1">
                <label for="cpf" class="text-xs font-semibold text-history-textMuted uppercase tracking-wider">CPF do Aluno</label>
                <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14" class="w-full bg-[#0B0F17] border border-slate-700 rounded-lg p-3 text-sm focus:outline-none focus:border-history-gold text-white placeholder-slate-600 transition-colors" required>
            </div>

            <div class="space-y-1">
                <label for="password" class="text-xs font-semibold text-history-textMuted uppercase tracking-wider">Senha</label>
                <input type="password" id="password" placeholder="••••••••" class="w-full bg-[#0B0F17] border border-slate-700 rounded-lg p-3 text-sm focus:outline-none focus:border-history-gold text-white placeholder-slate-600 transition-colors" required>
            </div>

            <button type="submit" class="w-full bg-history-gold hover:bg-history-goldHover text-history-bg font-bold py-3 rounded-lg text-sm transition-all duration-200 mt-2">
                Entrar como Aluno
            </button>
        </form>
    </div>

    <div class="mt-6 text-[11px] text-slate-600 text-center max-w-xs leading-relaxed">
        <p>💡 <span class="font-semibold">Ambiente Local:</span> Use qualquer CPF e a senha <code class="bg-slate-900 px-1 py-0.5 rounded text-history-gold font-mono">123456</code> para simular o acesso.</p>
    </div>

    <script>
        // Máscara simples de CPF
        document.getElementById('cpf').addEventListener('input', function (e) {
            let value = e.target.value.replace(/\D/g, "");
            if (value.length > 11) value = value.slice(0, 11);
            value = value.replace(/(\d{3})(\d)/, "$1.$2");
            value = value.replace(/(\d{3})(\d)/, "$1.$2");
            value = value.replace(/(\d{3})(\d{1,2})$/, "$1-$2");
            e.target.value = value;
        });

        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-message');

            if (password === '123456') {
                errorDiv.classList.add('hidden');
                localStorage.setItem('oficio_session_role', 'student');
                window.location.href = 'index.html';
            } else {
                errorDiv.classList.remove('hidden');
                document.getElementById('password').value = '';
            }
        });
    </script>
</body>
</html>
