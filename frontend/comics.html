<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ofício da História — Leitor de HQ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        history: {
                            bg: '#0B0F17',
                            card: '#131A26',
                            gold: '#D4AF37',
                            textMuted: '#94A3B8'
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-history-bg text-slate-100 min-h-screen flex flex-col justify-between font-sans">

    <header class="border-b border-slate-800 bg-history-bg/90 p-4 flex justify-between items-center px-6">
        <button onclick="window.location.href='index.html'" class="text-sm font-medium text-history-textMuted hover:text-history-gold transition-colors flex items-center gap-2">
            🏛️ Voltar ao Painel
        </button>
        <div class="text-center">
            <span id="hq-series" class="text-[10px] text-history-gold uppercase font-bold block tracking-widest">SÉRIE</span>
            <h1 id="hq-title" class="font-serif font-bold text-lg">Carregando...</h1>
        </div>
        <div class="w-20"></div> </header>

    <main class="flex-1 flex flex-col items-center justify-center p-4 max-w-2xl mx-auto w-full">
        <div class="bg-history-card border border-slate-800 rounded-xl p-2 shadow-2xl relative w-full group overflow-hidden">
            <img id="hq-page-img" src="https://images.unsplash.com/photo-1534447677768-be436bb09401?auto=format&fit=crop&w=600&q=80" alt="Página da HQ" class="w-full h-auto max-h-[70vh] object-contain rounded-lg transition-all duration-300">
            
            <div onclick="prevPage()" class="absolute top-0 left-0 w-1/4 h-full cursor-w-resize flex items-center p-4 opacity-0 group-hover:opacity-100 transition-opacity bg-gradient-to-r from-black/50 to-transparent">
                <span class="text-2xl text-history-gold">◀</span>
            </div>
            <div onclick="nextPage()" class="absolute top-0 right-0 w-1/4 h-full cursor-e-resize flex items-center justify-end p-4 opacity-0 group-hover:opacity-100 transition-opacity bg-gradient-to-l from-black/50 to-transparent">
                <span class="text-2xl text-history-gold">▶</span>
            </div>
        </div>
    </main>

    <footer class="border-t border-slate-800 bg-history-bg p-4 flex flex-col sm:flex-row justify-between items-center px-6 gap-4">
        <button onclick="prevPage()" class="w-full sm:w-auto bg-slate-800 hover:bg-slate-700 text-sm px-4 py-2 rounded-lg font-medium transition-colors">Página Anterior</button>
        <span id="page-indicator" class="text-sm font-serif text-history-textMuted font-medium">Pág 1 de 3</span>
        <button onclick="nextPage()" class="w-full sm:w-auto bg-history-gold hover:bg-amber-600 text-slate-900 text-sm px-4 py-2 rounded-lg font-bold transition-colors">Próxima Página</button>
    </footer>

    <script>
        // Simulação das páginas do quadrinho (Substituível por URLs do Supabase no futuro)
        const dummyPages = [
            "https://images.unsplash.com/photo-1534447677768-be436bb09401?auto=format&fit=crop&w=600&q=80", // Página 1 (Capa)
            "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&w=600&q=80", // Página 2
            "https://images.unsplash.com/photo-1579783900882-c0d3dad7b119?auto=format&fit=crop&w=600&q=80"  // Página 3
        ];

        let currentPageIndex = 0;

        function updateHQView() {
            document.getElementById('hq-page-img').src = dummyPages[currentPageIndex];
            document.getElementById('page-indicator').innerText = `Pág ${currentPageIndex + 1} de ${dummyPages.length}`;
        }

        function nextPage() {
            if (currentPageIndex < dummyPages.length - 1) {
                currentPageIndex++;
                updateHQView();
            }
        }

        function prevPage() {
            if (currentPageIndex > 0) {
                currentPageIndex--;
                updateHQView();
            }
        }

        // Recupera dados básicos passados por parâmetro ou carrega padrão
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            document.getElementById('hq-title').innerText = urlParams.get('title') || "Capítulo 1: O Cerco";
            document.getElementById('hq-series').innerText = urlParams.get('series') || "Crônicas de Wessex";
            updateHQView();
        });
    </script>
</body>
</html>
