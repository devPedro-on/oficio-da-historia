<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Aluno - Oficio da História</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏛️</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { history: { bg: '#0B0F17', card: '#131A26', gold: '#D4AF37', goldHover: '#AA8417', textMuted: '#94A3B8' } } } }
        }
    </script>
    <style> .bg-premium-gradient { background: radial-gradient(circle at top, #1a2333 0%, #0b0f17 70%); } </style>
</head>
<body class="bg-history-bg text-slate-100 min-h-screen bg-premium-gradient font-sans">

    <nav class="border-b border-slate-800 bg-history-bg/80 backdrop-blur-md sticky top-0 z-50 px-6 py-4 flex justify-between items-center">
        <span class="text-2xl font-serif font-bold tracking-wider text-history-gold">🏛️ OFÍCIO DA HISTÓRIA</span>
        <div class="flex items-center gap-4">
            <div class="text-right">
                <span class="block text-sm font-medium text-history-textMuted">Olá, Estudante</span>
                <button id="btn-logout" class="text-[10px] uppercase tracking-widest text-red-400 hover:text-red-300 transition-colors">Sair da conta</button>
            </div>
            <div id="user-avatar" class="w-10 h-10 rounded-full border-2 border-history-gold bg-slate-700 flex items-center justify-center font-bold text-history-gold">H</div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-8 space-y-10">
        <div id="error-banner" class="hidden bg-red-950/40 border border-red-500/40 text-red-200 p-4 rounded-xl text-center font-medium">
            ⚠️ Não foi possível carregar os dados do servidor. Verifique a conexão.
        </div>

        <div id="live-banner" class="hidden bg-amber-950/40 border border-history-gold/40 rounded-xl p-6 flex flex-col md:flex-row justify-between items-start md:items-center gap-4 shadow-xl shadow-amber-950/10">
            <div class="space-y-1">
                <div class="flex items-center gap-2 text-red-500 font-semibold tracking-wider text-xs uppercase"><span class="h-2 w-2 rounded-full bg-red-500 inline-block animate-ping"></span> Aula Ao Vivo Agora</div>
                <h2 id="live-title" class="text-xl font-bold font-serif text-white"></h2>
                <p id="live-description" class="text-sm text-history-textMuted"></p>
            </div>
            <button id="meet-btn" class="bg-history-gold hover:bg-history-goldHover text-history-bg font-bold px-6 py-3 rounded-lg transition-all">⚔️ Entrar no Google Meet</button>
        </div>

        <section class="space-y-4">
            <h3 class="text-lg font-serif font-semibold text-history-gold tracking-wide uppercase border-b border-slate-800 pb-2">Meus Cursos em Andamento</h3>
            <div id="courses-container" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
        </section>

        <section class="space-y-4">
            <h3 class="text-lg font-serif font-semibold text-history-gold tracking-wide uppercase border-b border-slate-800 pb-2">Biblioteca de Quadrinhos Históricos</h3>
            <div id="comics-container" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
        </section>
    </main>

    <script>
        // Redirecionamento de login comentado temporariamente para testes se necessário
        const sessionData = localStorage.getItem('oficio_session_user');
        if (!sessionData) {
            window.location.href = 'login-aluno.html';
        } else {
            // Aplica dinamicamente o primeiro nome e a letra inicial do avatar se os dados existirem
            try {
                const usuario = JSON.parse(sessionData);
                if (usuario && usuario.nome) {
                    document.querySelector('nav .text-right span').innerText = `Olá, ${usuario.nome.split(' ')[0]}`;
                    document.getElementById('user-avatar').innerText = usuario.nome.charAt(0).toUpperCase();
                }
            } catch (e) {
                console.error("Erro ao ler dados da sessão:", e);
            }
        }

        document.getElementById('btn-logout').addEventListener('click', () => {
            localStorage.removeItem('oficio_session_user');
            window.location.href = 'login-aluno.html';
        });

        async function loadDashboard() {
            try {
                const response = await fetch("https://oficio-backend-jg09.onrender.com/api/dashboard");
                if (!response.ok) throw new Error("Resposta do servidor não foi OK");
                
                const data = await response.json();

                // Esconde o banner de erro caso esteja visível
                document.getElementById('error-banner').classList.add('hidden');

                if (data.liveSession?.isLive) {
                    document.getElementById('live-title').innerText = data.liveSession.title;
                    document.getElementById('live-description').innerText = data.liveSession.description;
                    document.getElementById('meet-btn').onclick = () => window.open(data.liveSession.meetUrl, '_blank');
                    document.getElementById('live-banner').classList.remove('hidden');
                } else {
                    // Se isLive for falso ou não existir, esconde o banner da transmissão automaticamente
                    document.getElementById('live-banner').classList.add('hidden');
                }

                // Renderiza Cursos tratando possíveis variações de nomes de coluna
                if (data.courses && data.courses.length > 0) {
                    document.getElementById('courses-container').innerHTML = data.courses.map(c => {
                        const titulo = c.title || c.nome || "Curso sem título";
                        const progresso = c.progress !== undefined ? c.progress : (c.progresso || 0);
                        return `
                            <div class="bg-history-card border border-slate-800 p-5 rounded-xl">
                                <h4 class="font-bold text-lg">${titulo}</h4>
                                <div class="w-full bg-slate-800 h-2 mt-2 rounded-full">
                                    <div class="bg-history-gold h-full rounded-full" style="width: ${progresso}%"></div>
                                </div>
                            </div>`;
                    }).join('');
                } else {
                    document.getElementById('courses-container').innerHTML = `<p class="text-history-textMuted text-sm">Nenhum curso encontrado.</p>`;
                }

                // Renderiza Quadrinhos tratando possíveis variações de nomes de coluna
                if (data.comics && data.comics.length > 0) {
                    document.getElementById('comics-container').innerHTML = data.comics.map(hq => {
                        const titulo = hq.title || hq.nome || hq.titulo || "Sem título";
                        const capa = hq.cover || hq.capa || "https://via.placeholder.com/150";
                        return `
                            <div class="bg-history-card border border-slate-800 p-3 rounded-xl cursor-pointer hover:border-history-gold">
                                <img src="${capa}" class="rounded-lg mb-2 w-full object-cover aspect-[3/4]" alt="${titulo}">
                                <h5 class="text-sm font-bold">${titulo}</h5>
                            </div>`;
                    }).join('');
                } else {
                    document.getElementById('comics-container').innerHTML = `<p class="text-history-textMuted text-sm">Nenhum quadrinho encontrado.</p>`;
                }

            } catch (err) { 
                console.error("Erro ao carregar dashboard:", err);
                document.getElementById('error-banner').classList.remove('hidden');
            }
        }
        
        loadDashboard();
    </script>
</body>
</html>
