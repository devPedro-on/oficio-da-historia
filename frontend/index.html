<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Aluno - Oficio da História</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        history: {
                            bg: '#0B0F17',
                            card: '#131A26',
                            gold: '#D4AF37',
                            goldHover: '#AA8417',
                            textMuted: '#94A3B8'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .bg-premium-gradient { background: radial-gradient(circle at top, #1a2333 0%, #0b0f17 70%); }
    </style>
</head>
<body class="bg-history-bg text-slate-100 min-h-screen bg-premium-gradient font-sans">

    <nav class="border-b border-slate-800 bg-history-bg/80 backdrop-blur-md sticky top-0 z-50 px-6 py-4 flex justify-between items-center">
        <span class="text-2xl font-serif font-bold tracking-wider text-history-gold">🏛️ OFÍCIO DA HISTÓRIA</span>
        <div class="flex items-center gap-4">
            <div class="text-right">
                <span class="block text-sm font-medium text-history-textMuted">Olá, Estudante</span>
                <!-- Botão de Sair adicionado aqui -->
                <button id="btn-logout" class="text-[10px] uppercase tracking-widest text-red-400 hover:text-red-300 transition-colors">
                    Sair da conta
                </button>
            </div>
            <div class="w-10 h-10 rounded-full border-2 border-history-gold bg-slate-700 flex items-center justify-center font-bold text-history-gold">H</div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-8 space-y-10">
        <!-- O restante do seu corpo HTML permanece igual -->
        <div id="live-banner" class="hidden bg-amber-950/40 border border-history-gold/40 rounded-xl p-6 flex flex-col md:flex-row justify-between items-start md:items-center gap-4 shadow-xl shadow-amber-950/10">
            <div class="space-y-1">
                <div class="flex items-center gap-2 text-red-500 font-semibold tracking-wider text-xs uppercase">
                    <span class="h-2 w-2 rounded-full bg-red-500 inline-block animate-ping"></span>
                    Aula Ao Vivo Agora
                </div>
                <h2 id="live-title" class="text-xl font-bold font-serif text-white"></h2>
                <p id="live-description" class="text-sm text-history-textMuted"></p>
            </div>
            <button id="meet-btn" class="bg-history-gold hover:bg-history-goldHover text-history-bg font-bold px-6 py-3 rounded-lg shadow-lg shadow-history-gold/20 transition-all duration-200 transform hover:scale-105 whitespace-nowrap">
                ⚔️ Entrar no Google Meet
            </button>
        </div>

        <section class="space-y-4">
            <h3 class="text-lg font-serif font-semibold text-history-gold tracking-wide uppercase border-b border-slate-800 pb-2">Meus Cursos em Andamento</h3>
            <div id="courses-container" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
        </section>

        <section class="space-y-4">
            <h3 class="text-lg font-serif font-semibold text-history-gold tracking-wide uppercase border-b border-slate-800 pb-2">Biblioteca de Quadrinhos Históricos</h3>
            <div id="comics-container" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
        </section>
    </main>

    <footer class="text-center py-12 text-xs text-history-textMuted border-t border-slate-900 mt-20">
        <p>© 2026 Ofício da História. Criado para espalhar conhecimento de forma imersiva.</p>
    </footer>

    <script>
        // Verificação de sessão
        if (!localStorage.getItem('oficio_session_user')) {
            window.location.href = 'login.html';
        }

        // Função de Logout
        document.getElementById('btn-logout').addEventListener('click', function() {
            localStorage.removeItem('oficio_session_user');
            localStorage.removeItem('oficio_session_role');
            window.location.href = 'login.html';
        });

        const API_URL = "https://oficio-backend-jg09.onrender.com/api/dashboard";

        async function loadDashboard() {
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error("Falha ao carregar");
                const data = await response.json();

                // Lógica de renderização...
                if (data.liveSession && data.liveSession.isLive) {
                    document.getElementById('live-title').innerText = data.liveSession.title;
                    document.getElementById('live-description').innerText = data.liveSession.description;
                    document.getElementById('live-banner').classList.remove('hidden');
                }
                // ... (seu código de renderização continua aqui)
            } catch (error) {
                console.error("Erro ao carregar dados:", error);
            }
        }

        loadDashboard();
    </script>
</body>
</html>
