<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Aluno - Oficio da História</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        history: {
                            bg: '#0B0F17',
                            card: '#131A26',
                            gold: '#D4AF37',
                            goldHover: '#AA8417',
                            textMuted: '#94A3B8'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .bg-premium-gradient {
            background: radial-gradient(circle at top, #1a2333 0%, #0b0f17 70%);
        }
    </style>
</head>
<body class="bg-history-bg text-slate-100 min-h-screen bg-premium-gradient font-sans">

    <nav class="border-b border-slate-800 bg-history-bg/80 backdrop-blur-md sticky top-0 z-50 px-6 py-4 flex justify-between items-center">
        <span class="text-2xl font-serif font-bold tracking-wider text-history-gold">🏛️ OFÍCIO DA HISTÓRIA</span>
        <div class="flex items-center gap-4">
            <span class="text-sm font-medium text-history-textMuted">Olá, Estudante</span>
            <div class="w-10 h-10 rounded-full border-2 border-history-gold bg-slate-700 flex items-center justify-center font-bold text-history-gold">H</div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-8 space-y-10">

        <div id="live-banner" class="hidden bg-amber-950/40 border border-history-gold/40 rounded-xl p-6 flex flex-col md:flex-row justify-between items-start md:items-center gap-4 shadow-xl shadow-amber-950/10">
            <div class="space-y-1">
                <div class="flex items-center gap-2 text-red-500 font-semibold tracking-wider text-xs uppercase">
                    <span class="h-2 w-2 rounded-full bg-red-500 inline-block animate-ping"></span>
                    Aula Ao Vivo Agora
                </div>
                <h2 id="live-title" class="text-xl font-bold font-serif text-white"></h2>
                <p id="live-description" class="text-sm text-history-textMuted"></p>
            </div>
            <button id="meet-btn" class="bg-history-gold hover:bg-history-goldHover text-history-bg font-bold px-6 py-3 rounded-lg shadow-lg shadow-history-gold/20 transition-all duration-200 transform hover:scale-105 whitespace-nowrap">
                ⚔️ Entrar no Google Meet
            </button>
        </div>

        <section class="space-y-4">
            <h3 class="text-lg font-serif font-semibold text-history-gold tracking-wide uppercase border-b border-slate-800 pb-2">
                Meus Cursos em Andamento
            </h3>
            <div id="courses-container" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                </div>
        </section>

        <section class="space-y-4">
            <h3 class="text-lg font-serif font-semibold text-history-gold tracking-wide uppercase border-b border-slate-800 pb-2">
                Biblioteca de Quadrinhos Históricos
            </h3>
            <div id="comics-container" class="grid grid-cols-2 md:grid-cols-4 gap-4">
                </div>
        </section>

    </main>

    <footer class="text-center py-12 text-xs text-history-textMuted border-t border-slate-900 mt-20">
        <p>© 2026 Ofício da História. Criado para espalhar conhecimento de forma imersiva.</p>
    </footer>

    <script>
        // 🛡️ GUARDA SÊNIOR: Bloqueia o acesso direto se a role não for 'student'
        if (localStorage.getItem('oficio_session_role') !== 'student') {
            window.location.href = 'login-aluno.html';
        }

        const API_URL = "http://localhost:3000/api/dashboard";

        async function loadDashboard() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();

                // 1. Configurar o banner do Google Meet
                if (data.liveSession && data.liveSession.isLive) {
                    document.getElementById('live-title').innerText = data.liveSession.title;
                    document.getElementById('live-description').innerText = data.liveSession.description;
                    
                    const meetBtn = document.getElementById('meet-btn');
                    meetBtn.onclick = () => {
                        window.open(data.liveSession.meetUrl, '_blank');
                    };
                    
                    document.getElementById('live-banner').classList.remove('hidden');
                }

                // 2. Renderizar Cursos Dinâmicos
                const coursesContainer = document.getElementById('courses-container');
                coursesContainer.innerHTML = data.courses.map(course => `
                    <div class="bg-history-card border border-slate-800 rounded-xl overflow-hidden hover:border-history-gold/30 transition-all group flex flex-col justify-between">
                        <div>
                            <div class="h-44 bg-slate-800 bg-cover bg-center flex items-end p-4 relative" style="background-image: linear-gradient(to top, #131A26, transparent), url('${course.thumbnail}');">
                                <span class="bg-history-gold/20 text-history-gold border border-history-gold/30 text-xs font-semibold px-2.5 py-1 rounded">${course.category}</span>
                            </div>
                            <div class="p-5 space-y-2">
                                <h4 class="text-xl font-serif font-bold group-hover:text-history-gold transition-colors">${course.title}</h4>
                                <p class="text-sm text-history-textMuted line-clamp-2">${course.description}</p>
                            </div>
                        </div>
                        <div class="p-5 pt-0 space-y-4">
                            <div class="space-y-1">
                                <div class="flex justify-between text-xs text-history-textMuted">
                                    <span>Progresso</span>
                                    <span class="text-history-gold font-medium">${course.progress}%</span>
                                </div>
                                <div class="w-full bg-slate-800 h-2 rounded-full overflow-hidden">
                                    <div class="bg-history-gold h-full rounded-full" style="width: ${course.progress}%"></div>
                                </div>
                            </div>
                            <button class="w-full bg-slate-800 hover:bg-slate-700 text-slate-200 border border-slate-700 font-medium py-2.5 rounded-lg transition-colors">
                                Acessar Conteúdo
                            </button>
                        </div>
                    </div>
                `).join('');

                // 3. Renderizar as HQs integradas com link de navegação para o leitor
                const comicsContainer = document.getElementById('comics-container');
                comicsContainer.innerHTML = data.comics.map(item => `
                    <div onclick="window.location.href='comics.html?title=${encodeURIComponent(item.title)}&series=${encodeURIComponent(item.series)}'" 
                         class="bg-history-card border border-slate-800 p-3 rounded-xl space-y-3 hover:transform hover:-translate-y-1 transition-all duration-200 cursor-pointer group">
                        <div class="aspect-[3/4] rounded-lg bg-slate-800 overflow-hidden bg-cover bg-center" style="background-image: url('${item.cover}');"></div>
                        <div class="space-y-0.5">
                            <span class="text-[10px] text-history-gold uppercase font-semibold">${item.series}</span>
                            <h5 class="font-serif font-bold text-sm text-slate-200 group-hover:text-history-gold transition-colors line-clamp-1">${item.title}</h5>
                        </div>
                    </div>
                `).join('');

            } catch (error) {
                console.error("Erro ao carregar dados do backend no WSL:", error);
            }
        }

        loadDashboard();
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(() => console.log('PWA: Pronto para ser instalado no telemóvel!'))
                .catch((err) => console.log('Erro ao registar PWA:', err));
        }
    </script>
</body>
</html>
