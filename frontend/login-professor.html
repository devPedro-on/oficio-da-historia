<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login do Professor - Ofício da História</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏛️</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        history: {
                            bg: '#0B0F17',
                            card: '#131A26',
                            gold: '#D4AF37',
                            goldHover: '#AA8417',
                            textMuted: '#94A3B8'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .bg-premium-gradient {
            background: radial-gradient(circle at center, #241919 0%, #0b0f17 100%);
        }
    </style>
</head>
<body class="bg-history-bg text-slate-100 min-h-screen bg-premium-gradient flex flex-col justify-center items-center px-4 font-sans">

    <div class="w-full max-w-md bg-history-card border border-red-950/40 rounded-2xl p-8 shadow-2xl space-y-6">
        <div class="text-center space-y-2">
            <h1 class="text-3xl font-serif font-bold tracking-wider text-red-400">🏛️</h1>
            <h2 class="text-2xl font-serif font-bold tracking-tight text-white">Ofício da História</h2>
            <p class="text-xs text-red-400 uppercase tracking-widest font-semibold">Controle do Professor</p>
        </div>

        <div id="error-message" class="hidden bg-red-950/80 text-red-400 border border-red-500/30 p-3 rounded-lg text-xs text-center font-medium">
            Acesso negado. Credenciais administrativas inválidas.
        </div>

        <form id="login-form" class="space-y-4">
            <div class="space-y-1">
                <label for="cpf" class="text-xs font-semibold text-history-textMuted uppercase tracking-wider">CPF Administrativo</label>
                <input type="text" id="cpf" inputmode="numeric" placeholder="000.000.000-00" maxlength="14" class="w-full bg-[#0B0F17] border border-slate-700 rounded-lg p-3 text-sm focus:outline-none focus:border-red-500 text-white placeholder-slate-600 transition-colors" required>
            </div>

            <div class="space-y-1">
                <label for="password" class="text-xs font-semibold text-history-textMuted uppercase tracking-wider">Senha Master</label>
                <div class="relative">
                    <input type="password" id="password" placeholder="••••••••" class="w-full bg-[#0B0F17] border border-slate-700 rounded-lg p-3 pr-10 text-sm focus:outline-none focus:border-red-500 text-white placeholder-slate-600 transition-colors" required>
                    <button type="button" id="toggle-password" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-red-400 transition-colors select-none flex items-center justify-center">
                        <svg id="eye-open" class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                        </svg>
                        <svg id="eye-closed" class="w-5 h-5 hidden" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M3 14c2.5-3.33 6.5-5 9-5s6.5 1.67 9 5M4 11l-1.5-2M8 9.5l-1-2.5M12 9V6M16 9.5l1-2.5M20 11l1.5-2" />
                        </svg>
                    </button>
                </div>
            </div>

            <button type="submit" id="login-btn" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 rounded-lg text-sm transition-all duration-200 mt-2 shadow-lg shadow-red-900/20">
                Autenticar Painel Master
            </button>
        </form>

        <div class="text-center border-t border-slate-800/60 pt-4">
            <a href="login-aluno.html" class="text-xs text-history-textMuted hover:text-history-gold transition-colors">
                ← Voltar para o Portal do Aluno
            </a>
        </div>
    </div>

    <script>
        if (localStorage.getItem('oficio_session_role') === 'teacher') {
            window.location.href = 'teacher.html';
        }

        // Alternar visibilidade com a nova dinâmica de ícones
        document.getElementById('toggle-password').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            const eyeOpen = document.getElementById('eye-open');
            const eyeClosed = document.getElementById('eye-closed');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeOpen.classList.add('hidden');
                eyeClosed.classList.remove('hidden');
            } else {
                passwordInput.type = 'password';
                eyeOpen.classList.remove('hidden');
                eyeClosed.classList.add('hidden');
            }
        });

        document.getElementById('cpf').addEventListener('input', function (e) {
            let value = e.target.value.replace(/\D/g, "");
            if (value.length > 11) value = value.slice(0, 11);
            value = value.replace(/(\d{3})(\d)/, "$1.$2").replace(/(\d{3})(\d)/, "$1.$2").replace(/(\d{3})(\d{1,2})$/, "$1-$2");
            e.target.value = value;
        });

        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const cpfDigitado = document.getElementById('cpf').value.replace(/\D/g, "");
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-message');
            const btn = document.getElementById('login-btn');

            btn.innerText = "Autenticando...";
            btn.disabled = true;
            errorDiv.classList.add('hidden');

            if (cpfDigitado === '01927053005' && password === 'admin123') {
                errorDiv.classList.add('hidden');
                localStorage.setItem('oficio_session_role', 'teacher');
                window.location.href = 'teacher.html';
            } else {
                errorDiv.classList.remove('hidden');
                document.getElementById('password').value = '';
                btn.innerText = "Autenticar Painel Master";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
